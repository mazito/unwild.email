<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <pattern id="p" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#d8dce3" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.15">
        <!-- horizontal traces -->
        <path d="M0 20 H40 L50 30 H110 L120 20 H160" />
        <path d="M0 60 H20 L30 70 H70 L80 60 H160" />
        <path d="M0 100 H50 L60 110 H120 L130 100 H160" />
        <path d="M0 140 H30 L40 130 H90 L100 140 H160" />
        <!-- vertical traces -->
        <path d="M30 0 V15 L40 25 V55 L30 65 V95" />
        <path d="M90 0 V25 L100 35 V75" />
        <path d="M130 30 V70 L120 80 V130" />
        <path d="M60 90 V120 L70 130 V160" />
        <!-- pads / vias -->
        <circle cx="40" cy="25" r="2" fill="#d8dce3" stroke="none" />
        <circle cx="110" cy="30" r="2" fill="#d8dce3" stroke="none" />
        <circle cx="30" cy="70" r="2" fill="#d8dce3" stroke="none" />
        <circle cx="80" cy="60" r="2" fill="#d8dce3" stroke="none" />
        <circle cx="60" cy="110" r="2" fill="#d8dce3" stroke="none" />
        <circle cx="130" cy="100" r="2" fill="#d8dce3" stroke="none" />
        <circle cx="40" cy="130" r="2" fill="#d8dce3" stroke="none" />
        <circle cx="100" cy="140" r="2" fill="#d8dce3" stroke="none" />
        <!-- small chip rectangles -->
        <rect x="105" y="55" width="20" height="10" rx="1" />
        <rect x="15" y="115" width="18" height="8" rx="1" />
        <rect x="85" y="135" width="14" height="8" rx="1" />
      </g>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#p)" />
</svg>
